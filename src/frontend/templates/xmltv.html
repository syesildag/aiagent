<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>XMLTV Guide</title>
  <meta name="theme-color" content="#0c0c10">
  <meta name="description" content="XMLTV Electronic Programme Guide">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="XMLTV Guide">
  <link rel="manifest" href="/xmltv/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/static/icons/xmltv-icon.svg">
  <link rel="apple-touch-icon" href="/static/icons/xmltv-icon.svg">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: 'Outfit', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: #0c0c10;
      color: #fff;
    }
    #root {
      width: 100%;
      height: 100vh;
      height: 100dvh;
    }
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-size: 18px;
      color: #ff6b6b;
      letter-spacing: 0.05em;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
  />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/icon?family=Material+Icons"
  />
</head>
<body>
  <div id="root">
    <div class="loading">Loading...</div>
  </div>
  <script defer src="/static/vendors.js"></script>
  <script defer src="/static/xmltv.js"></script>
</body>
</html>
