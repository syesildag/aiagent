<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark background -->
  <rect width="512" height="512" rx="96" fill="#0c0c10"/>

  <!-- TV screen body -->
  <rect x="72" y="140" width="368" height="240" rx="24" fill="#1a1a2e"/>
  <!-- Screen bezel -->
  <rect x="88" y="156" width="336" height="208" rx="14" fill="#0f0f1a"/>
  <!-- Screen glow/content area -->
  <rect x="96" y="164" width="320" height="192" rx="10" fill="#0a0a14"/>

  <!-- EPG grid lines (horizontal) -->
  <line x1="96" y1="212" x2="416" y2="212" stroke="#1e3a5f" stroke-width="1.5" opacity="0.8"/>
  <line x1="96" y1="260" x2="416" y2="260" stroke="#1e3a5f" stroke-width="1.5" opacity="0.8"/>
  <line x1="96" y1="308" x2="416" y2="308" stroke="#1e3a5f" stroke-width="1.5" opacity="0.8"/>

  <!-- EPG vertical divider (channel column) -->
  <line x1="148" y1="164" x2="148" y2="356" stroke="#1e3a5f" stroke-width="1.5" opacity="0.8"/>

  <!-- Channel icons (left column) - colored dots -->
  <circle cx="122" cy="188" r="10" fill="#e91e63" opacity="0.9"/>
  <circle cx="122" cy="236" r="10" fill="#2196f3" opacity="0.9"/>
  <circle cx="122" cy="284" r="10" fill="#ff9800" opacity="0.9"/>
  <circle cx="122" cy="332" r="10" fill="#4caf50" opacity="0.9"/>

  <!-- Programme blocks row 1 -->
  <rect x="156" y="172" width="110" height="32" rx="6" fill="#1565c0" opacity="0.9"/>
  <rect x="272" y="172" width="72" height="32" rx="6" fill="#1565c0" opacity="0.8"/>
  <rect x="350" y="172" width="58" height="32" rx="6" fill="#0d47a1" opacity="0.7"/>

  <!-- Programme blocks row 2 — highlighted (now playing) -->
  <rect x="156" y="220" width="68" height="32" rx="6" fill="#7b1fa2" opacity="0.9"/>
  <rect x="230" y="220" width="100" height="32" rx="6" fill="#e53935" opacity="1"/>
  <!-- "NOW" glow on highlighted block -->
  <rect x="230" y="220" width="100" height="32" rx="6" fill="none" stroke="#ff6b6b" stroke-width="2"/>
  <rect x="336" y="220" width="72" height="32" rx="6" fill="#4a148c" opacity="0.8"/>

  <!-- Programme blocks row 3 -->
  <rect x="156" y="268" width="136" height="32" rx="6" fill="#1b5e20" opacity="0.9"/>
  <rect x="298" y="268" width="110" height="32" rx="6" fill="#2e7d32" opacity="0.8"/>

  <!-- Programme blocks row 4 -->
  <rect x="156" y="316" width="80" height="32" rx="6" fill="#e65100" opacity="0.9"/>
  <rect x="242" y="316" width="130" height="32" rx="6" fill="#bf360c" opacity="0.8"/>
  <rect x="378" y="316" width="30" height="32" rx="6" fill="#4e342e" opacity="0.7"/>

  <!-- Time indicator bar at top of screen -->
  <rect x="96" y="164" width="320" height="20" rx="6" fill="#0d1b2a" opacity="0.95"/>
  <rect x="96" y="164" width="320" height="8" rx="4" fill="#1a3a5c" opacity="0.6"/>
  <!-- Time dots -->
  <circle cx="200" cy="174" r="2" fill="#4fc3f7" opacity="0.8"/>
  <circle cx="256" cy="174" r="2" fill="#4fc3f7" opacity="0.8"/>
  <circle cx="312" cy="174" r="2" fill="#4fc3f7" opacity="0.8"/>
  <circle cx="368" cy="174" r="2" fill="#4fc3f7" opacity="0.8"/>

  <!-- TV stand legs -->
  <rect x="200" y="380" width="20" height="48" rx="8" fill="#1a1a2e"/>
  <rect x="292" y="380" width="20" height="48" rx="8" fill="#1a1a2e"/>
  <!-- Stand base -->
  <rect x="168" y="420" width="80" height="16" rx="8" fill="#1a1a2e"/>
  <rect x="264" y="420" width="80" height="16" rx="8" fill="#1a1a2e"/>

  <!-- Accent: small "live" dot in top-right of screen -->
  <circle cx="404" cy="174" r="5" fill="#f44336"/>
  <circle cx="404" cy="174" r="3" fill="#ff6b6b"/>
</svg>
